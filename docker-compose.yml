version: '3.8'

services:
  web:
    build: .
    container_name: liquest-back-web
    volumes:
      - static_volume:/app/static
    expose:
      - "8000"

  nginx:
    image: nginx:stable
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/static
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

volumes:
  static_volume:
